name: Android CI/CD

on:
  push:
    branches: [ "master" ] # Roda sempre que enviar para a main
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout o código
        uses: actions/checkout@v4

      - name: Configurar o Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Dar permissão ao Gradle
        run: chmod +x gradlew

      - name: Compilar e Gerar APK (Build)
        run: ./gradlew assembleDebug

      - name: Salvar o APK (Upload)
        uses: actions/upload-artifact@v4
        with:
          name: meu-app-debug
          path: app/build/outputs/apk/debug/app-debug.apkname: Android CI/CD

