name: Android CI/CD

on:
  push:
    branches: [ "master" ] # Roda sempre que enviar para a main
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout o código
        uses: actions/checkout@v4

      - name: Configurar o Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Dar permissão ao Gradle
        run: chmod +x gradlew

    # Validação de Qualidade
      - name: Rodar Linter
        run: ./gradlew lintDebug
        continue-on-error: true #Remover se quiser que o build falhe com imports inúteis

    # Validação de Lógica (TDD)
      - name: Rodar Testes de Unidade
        run: ./gradlew test

        #CD - Entregas

      - name: Publicar Relatório do Linter (CD)
        uses: actions/upload-artifact@v4
        with:
            name: relatorio-linter
            path: app/build/reports/lint-results-debug.html

      - name: Salvar Relatório de Testes (Caso falhe)
        uses: actions/upload-artifact@v4
        if: failure() # Só salva se algum teste der erro
        with:
          name: resultado-dos-testes
          path: app/build/reports/tests/testDebugUnitTest/index.html

      - name: Compilar e Gerar APK (Build)
        run: ./gradlew assembleDebug

      - name: Salvar o APK (Upload)
        uses: actions/upload-artifact@v4
        with:
          name: meu-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk